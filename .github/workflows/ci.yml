name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    # Real Redis and Postgres so the event-bus and wallet-repository integration
    # tests run for real (they skip when unreachable, e.g. local dev without Docker).
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: botcrypto
          POSTGRES_PASSWORD: botcrypto
          POSTGRES_DB: botcrypto
        options: >-
          --health-cmd "pg_isready -U botcrypto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgresql://botcrypto:botcrypto@localhost:5432/botcrypto

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Format check
        run: pnpm format:check
