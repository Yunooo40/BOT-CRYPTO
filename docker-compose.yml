services:
  postgres:
    image: postgres:16-alpine
    container_name: botcrypto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: botcrypto
      POSTGRES_PASSWORD: botcrypto
      POSTGRES_DB: botcrypto
    ports:
      - "5432:5432"
    volumes:
      - botcrypto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botcrypto -d botcrypto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: botcrypto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - botcrypto-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  botcrypto-pgdata:
  botcrypto-redisdata:
